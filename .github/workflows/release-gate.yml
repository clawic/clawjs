name: Release Gate

on:
  push:
    branches:
      - main
      - next
      - "release/**"
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - next
      - "release/**"
  workflow_dispatch:

jobs:
  release-readiness:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            website/package-lock.json

      - run: npm ci
      - run: npm --prefix website ci
      - run: npm run ci
      - run: npm run publish:dry-run
